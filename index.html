<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Bouli">
<meta name="description" content="Misst Boule-Abstände zum Cochonnet aus einem Foto mit Meterstab als Referenz.">
<title>Bouli — Boule Abstandsmessung</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100vh;
    height: 100dvh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f172a;
    color: #f1f5f9;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    overscroll-behavior: none;
  }
  body {
    display: flex;
    flex-direction: column;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }

  header {
    background: #1e293b;
    padding: 10px 12px;
    border-bottom: 1px solid #334155;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-shrink: 0;
  }
  header .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  header .brand img {
    width: 28px;
    height: 28px;
    border-radius: 7px;
  }
  header h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  header h1 span { color: #64748b; font-weight: 400; font-size: 12px; margin-left: 4px; }
  .header-actions { display: flex; gap: 6px; }

  button {
    background: #3b82f6;
    color: white;
    border: none;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    touch-action: manipulation;
    transition: transform 0.05s, background 0.15s;
    min-height: 48px;
    min-width: 48px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    white-space: nowrap;
    font-family: inherit;
  }
  button:active { transform: scale(0.97); }
  button:hover { background: #2563eb; }
  button:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; }
  button.secondary { background: #334155; color: #e2e8f0; }
  button.secondary:hover { background: #475569; }
  button.icon-btn {
    padding: 10px;
    min-width: 44px;
    min-height: 44px;
    background: #334155;
    font-size: 18px;
  }
  button.icon-btn:hover { background: #475569; }
  button.primary-cta {
    width: 100%;
    padding: 16px 20px;
    font-size: 16px;
    border-radius: 12px;
  }
  button.big-cta {
    padding: 24px;
    font-size: 17px;
    flex-direction: column;
    gap: 8px;
    border-radius: 16px;
    min-height: 120px;
    width: 100%;
    max-width: 280px;
  }
  button.big-cta .icon { font-size: 32px; }

  #stage {
    flex: 1;
    position: relative;
    background: #020617;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }

  #placeholder {
    text-align: center;
    color: #94a3b8;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-items: center;
    width: 100%;
  }
  #placeholder p {
    font-size: 14px;
    line-height: 1.5;
    max-width: 320px;
    color: #64748b;
  }
  #placeholder .ph-logo {
    width: 96px;
    height: 96px;
    border-radius: 22px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
    margin-bottom: 4px;
  }
  #placeholder h2 {
    font-size: 22px;
    font-weight: 700;
    color: #f1f5f9;
    margin-top: 4px;
    letter-spacing: -0.02em;
  }
  #placeholder .ph-buttons {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    align-items: center;
    margin-top: 8px;
  }

  #canvas-wrap {
    position: relative;
    max-width: 100%;
    max-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    display: block;
    max-width: 100%;
    max-height: 100%;
    cursor: crosshair;
    touch-action: none;
  }

  #step-badge {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(15, 23, 42, 0.92);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: white;
    padding: 10px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    border: 1px solid rgba(59, 130, 246, 0.4);
    max-width: calc(100% - 24px);
    text-align: center;
    z-index: 10;
    pointer-events: none;
    line-height: 1.3;
  }
  #step-badge .step-num {
    color: #60a5fa;
    font-weight: 700;
    margin-right: 6px;
  }
  #step-badge.hidden { display: none; }

  #cal-chip {
    background: #0f172a;
    border: 1px solid rgba(239, 68, 68, 0.5);
    color: white;
    padding: 8px 12px;
    border-radius: 18px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: inherit;
    transition: transform 0.05s, background 0.15s;
    min-height: 36px;
  }
  #cal-chip:hover { background: #1a2433; }
  #cal-chip:active { transform: scale(0.96); }
  #cal-chip.hidden { display: none; }
  #cal-chip .edit-icon { opacity: 0.6; font-size: 11px; }

  /* ---------- Modal ---------- */
  .modal {
    position: fixed;
    inset: 0;
    z-index: 2000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal.hidden { display: none; }
  .modal-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(2, 6, 23, 0.7);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }
  .modal-content {
    position: relative;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 16px;
    padding: 20px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    animation: modalIn 0.18s ease-out;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-content h3 {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 4px;
    color: #f1f5f9;
  }
  .modal-content .modal-hint {
    color: #94a3b8;
    font-size: 13px;
    margin-bottom: 16px;
    line-height: 1.4;
  }
  .modal-input-group {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #0f172a;
    border: 2px solid #3b82f6;
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 16px;
  }
  .modal-input-group input {
    flex: 1;
    background: transparent;
    border: none;
    color: white;
    font-size: 22px;
    font-weight: 700;
    outline: none;
    font-family: inherit;
    font-variant-numeric: tabular-nums;
    text-align: center;
    width: 100%;
    min-width: 0;
  }
  .modal-input-group .modal-unit {
    color: #94a3b8;
    font-size: 16px;
    font-weight: 600;
  }
  .modal-actions {
    display: flex;
    gap: 8px;
  }
  .modal-actions button { flex: 1; }
  .quick-presets {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .preset-btn {
    flex: 1;
    min-width: 60px;
    background: #334155;
    border: 1px solid #475569;
    color: #cbd5e1;
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .preset-btn:hover { background: #475569; }
  .preset-btn.active {
    background: rgba(59, 130, 246, 0.2);
    border-color: #3b82f6;
    color: #93c5fd;
  }

  #toast {
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%) translateY(-8px);
    background: rgba(34, 197, 94, 0.92);
    color: white;
    padding: 10px 18px;
    border-radius: 24px;
    font-size: 13px;
    font-weight: 600;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    z-index: 20;
    max-width: calc(100% - 24px);
    text-align: center;
  }
  #toast.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  #results-bar {
    background: #1e293b;
    border-top: 1px solid #334155;
    padding: 8px 12px;
    overflow-x: auto;
    flex-shrink: 0;
    -webkit-overflow-scrolling: touch;
  }
  #results-bar::-webkit-scrollbar { height: 4px; }
  #results-bar::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }
  #results-bar.hidden { display: none; }
  .results-row {
    display: flex;
    gap: 8px;
    white-space: nowrap;
    align-items: center;
  }
  .results-row .label-prefix {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #60a5fa;
    font-weight: 700;
    margin-right: 4px;
    flex-shrink: 0;
  }
  .result-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #334155;
    color: #f1f5f9;
    padding: 6px 12px;
    border-radius: 14px;
    font-size: 13px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .result-pill .pname { color: #cbd5e1; font-weight: 500; }
  .result-pill .pval { color: white; }
  .result-pill.winner {
    background: rgba(34, 197, 94, 0.18);
    color: #4ade80;
    border: 1px solid rgba(34, 197, 94, 0.5);
  }
  .result-pill.winner .pname { color: #86efac; }
  .result-pill.winner .pval { color: #4ade80; }

  #toolbar {
    background: #1e293b;
    padding: 10px 12px;
    border-top: 1px solid #334155;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex-shrink: 0;
  }
  #toolbar.empty { display: none; }
  #toolbar .row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  #toolbar .row.aux button {
    flex: 1;
    padding: 10px;
    font-size: 13px;
    min-height: 40px;
    background: #334155;
  }
  #toolbar .row.primary { flex-direction: column; }

  .input-group {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    background: #0f172a;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid #334155;
  }
  .input-group label {
    font-size: 14px;
    color: #cbd5e1;
    white-space: nowrap;
  }
  .input-group input {
    background: transparent;
    border: none;
    color: white;
    padding: 4px;
    font-size: 17px;
    font-weight: 600;
    width: 80px;
    text-align: center;
    outline: none;
    font-variant-numeric: tabular-nums;
    font-family: inherit;
  }
  .input-group .unit { color: #94a3b8; font-size: 14px; }

  #camera-modal {
    position: fixed;
    inset: 0;
    background: black;
    z-index: 1000;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #camera-modal.active { display: flex; }
  #camera-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  #camera-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #level-indicator {
    width: 180px;
    height: 180px;
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 50%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 40px rgba(0,0,0,0.4);
  }
  #level-indicator::before {
    content: '';
    position: absolute;
    inset: 25%;
    border: 1px dashed rgba(255,255,255,0.3);
    border-radius: 50%;
  }
  #level-bubble {
    width: 28px;
    height: 28px;
    background: rgba(59, 130, 246, 0.85);
    border: 2px solid white;
    border-radius: 50%;
    transition: transform 0.08s;
    box-shadow: 0 0 12px rgba(59, 130, 246, 0.6);
  }
  #level-indicator.level #level-bubble {
    background: rgba(34, 197, 94, 0.9);
    box-shadow: 0 0 20px rgba(34, 197, 94, 0.8);
  }
  #level-text {
    position: absolute;
    top: max(env(safe-area-inset-top), 20px);
    left: 50%;
    transform: translateX(-50%);
    color: white;
    background: rgba(0,0,0,0.7);
    padding: 10px 18px;
    border-radius: 24px;
    font-size: 14px;
    font-weight: 500;
    text-align: center;
    max-width: calc(100% - 32px);
    white-space: nowrap;
  }
  #camera-controls {
    position: absolute;
    bottom: max(env(safe-area-inset-bottom), 24px);
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-around;
    align-items: center;
    padding: 0 24px;
    pointer-events: auto;
  }
  #shutter {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: white;
    border: 4px solid rgba(255,255,255,0.4);
    cursor: pointer;
    padding: 0;
    transition: transform 0.1s;
  }
  #shutter:active { transform: scale(0.92); }
  #shutter:disabled { background: #64748b; cursor: not-allowed; }
  #camera-cancel, #camera-flip {
    background: rgba(0,0,0,0.6);
    color: white;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    padding: 0;
    font-size: 18px;
  }

  #file-input { display: none; }

  @media (max-width: 380px) {
    header h1 { font-size: 15px; }
    header h1 span { display: none; }
    button { font-size: 14px; padding: 12px 14px; }
    #step-badge { font-size: 12px; padding: 8px 12px; }
  }

  @media (max-height: 500px) and (orientation: landscape) {
    header { padding: 6px 10px; }
    header h1 { font-size: 14px; }
    #step-badge { top: 6px; padding: 6px 12px; font-size: 12px; }
    #toolbar { padding: 6px 8px; }
    button { padding: 10px 14px; min-height: 40px; }
    button.primary-cta { padding: 10px 16px; }
    #placeholder .ph-logo { width: 56px; height: 56px; }
    #placeholder h2 { font-size: 18px; }
    #placeholder p { font-size: 12px; }
    button.big-cta { min-height: 70px; padding: 12px 16px; flex-direction: row; }
    button.big-cta .icon { font-size: 22px; }
  }

  @media (min-width: 768px) {
    #placeholder .ph-buttons { flex-direction: row; }
    button.big-cta { max-width: 220px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <img src="icons/icon-192.png" alt="Bouli" />
    <h1>Bouli</h1>
  </div>
  <div class="header-actions">
    <button id="cal-chip" class="hidden" title="Stablänge anpassen" aria-label="Stablänge anpassen">
      📏 <span id="cal-chip-value">100</span> cm <span class="edit-icon">✎</span>
    </button>
    <button id="btn-upload" class="icon-btn" title="Bild laden" aria-label="Bild laden">📁</button>
    <button id="btn-reset" class="icon-btn" title="Neu starten" aria-label="Neu starten">↺</button>
  </div>
</header>

<div id="stage">
  <div id="placeholder">
    <img class="ph-logo" src="icons/icon-512.png" alt="Bouli">
    <h2>Bouli</h2>
    <p>Foto direkt von oben mit Meterstab im Bild — Bouli erkennt Kugeln und Schweinchen automatisch.</p>
    <div class="ph-buttons">
      <button id="btn-camera" class="big-cta">
        <span class="icon">📷</span>
        <span>Kamera öffnen</span>
      </button>
      <button id="btn-upload" class="big-cta secondary">
        <span class="icon">📁</span>
        <span>Bild auswählen</span>
      </button>
    </div>
    <input type="file" id="file-input" accept="image/*">
  </div>

  <div id="canvas-wrap" style="display:none;">
    <canvas id="canvas"></canvas>
    <div id="step-badge" class="hidden"></div>
    <div id="toast"></div>
  </div>
</div>

<div id="results-bar" class="hidden"></div>

<div id="toolbar" class="empty">
  <div id="toolbar-content"></div>
</div>

<div id="camera-modal">
  <video id="camera-video" autoplay playsinline muted></video>
  <div id="camera-overlay">
    <div id="level-text">Halte das Handy waagerecht</div>
    <div id="level-indicator">
      <div id="level-bubble"></div>
    </div>
  </div>
  <div id="camera-controls">
    <button id="camera-cancel">✕</button>
    <button id="shutter" title="Foto aufnehmen" aria-label="Auslöser"></button>
    <button id="camera-flip">↻</button>
  </div>
</div>

<div id="length-modal" class="modal hidden">
  <div class="modal-backdrop" data-close="1"></div>
  <div class="modal-content">
    <h3>Stablänge anpassen</h3>
    <p class="modal-hint">Wie lang ist der Referenzstab im Bild?</p>
    <div class="quick-presets">
      <button class="preset-btn" data-cm="50">50 cm</button>
      <button class="preset-btn" data-cm="100">100 cm</button>
      <button class="preset-btn" data-cm="200">200 cm</button>
    </div>
    <div class="modal-input-group">
      <input type="number" id="length-input" inputmode="decimal" step="0.1" min="1">
      <span class="modal-unit">cm</span>
    </div>
    <div class="modal-actions">
      <button id="length-cancel" class="secondary" data-close="1">Abbrechen</button>
      <button id="length-save">Speichern</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
